<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Networker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #18181b;
      background: #fff;
      width: 220px;
      padding: 16px;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: #0a66c2; color: #fff;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-name { font-weight: 700; font-size: 14px; color: #0a66c2; }
    p {
      font-size: 12px; color: #71717a; line-height: 1.5;
      margin-bottom: 14px;
    }
    .btn {
      display: block; width: 100%;
      padding: 8px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500;
      border: none; cursor: pointer;
      font-family: inherit; text-align: center;
      transition: background 0.15s;
      margin-bottom: 8px;
    }
    .btn-primary { background: #0a66c2; color: #fff; }
    .btn-primary:hover { background: #004182; }
    .btn-secondary {
      background: #f4f4f5; color: #18181b;
      border: 1px solid #e4e4e7;
    }
    .btn-secondary:hover { background: #e4e4e7; }
    #status { font-size: 11px; color: #71717a; text-align: center; }
    #status.ok { color: #16a34a; }
    #status.warn { color: #d97706; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">LN</div>
    <span class="logo-name">LinkedIn Networker</span>
  </div>
  <p id="hint">Navigate to a LinkedIn profile to open the sidebar.</p>
  <button class="btn btn-primary" id="btn-toggle">Open Sidebar</button>
  <button class="btn btn-secondary" id="btn-settings">Settings</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
